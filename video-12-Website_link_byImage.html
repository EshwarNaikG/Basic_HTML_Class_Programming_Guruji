<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Website Link By Images</title>
    <style>
        a {
            text-decoration: none;
        }
        
        img{
            align-content: space-around;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; color: white; background-color: black;">Well come to my website</h1>
    <h1 style="background-color: blue; color: white; text-align: center;">Apply Link on image</h1>
    <br>
    <a href="https://www.youtube.com/" target="_blank">
        <img src="images/youtube.png" alt="Youtube Logo" width="50px">
    </a>
    <a href="https://www.facebook.com/" target="_blank">
        <img src="images/facebook.png" alt="Facebook Logo" width="50px">
    </a>
    <a href="https://www.instagram.com/" target="_blank">
        <img src="images/instagram.png" alt="Instagram Logo" width="50px">
    </a>
    <a href="https://www.linkedin.com/" target="_blank">
        <img src="images/linkedin.png" alt="LinkedIn Logo" width="50px">
    </a>
    <a href="https://flipkart.com/" target="_blank">
        <img src="images/flipkart.png" alt="Flipkart Logo" width="50px">
    </a>
    <a href="https://amazon.com/" target="_blank">
        <img src="images/amazon.png" alt="Amazon Logo" width="50px";">
    </a>

</body>
</html>
