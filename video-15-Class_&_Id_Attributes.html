<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class & ID Attributes</title>
<style>
    .a{
        color: red;
        background-color: lightgray;
        font-size: 30px;
    }
    #b{
        color: blue;
        font-size: 20px;
        background-color: yellow;
        display: inline-block;
        font-weight: bold;
        
    }
</style>    
</head>
<body>
    <h1>Class & ID Attributes</h1>
    <p class="paragraph">This is a paragraph with class attribute.</p>
    <p id="unique-paragraph">This is a paragraph with id attribute.</p>

    <h2 class="a">Eshwara Naik G</h2>
    <p class="a" id="b">This is a paragraph.</p>
    <h3 class="a">Eshwara Naik G</h3>
    <h4 class="a">Eshwara Naik G</h4>
    
</body>
</html>
