<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Tag Example</title>
</head>
<body>
    <!-- controls is important for audio playback -->
     <!-- loop attribute allows the audio to play continuously -->
    <audio controls loop>
        <source src="Audio/song1.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
