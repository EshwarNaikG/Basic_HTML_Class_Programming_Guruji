<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formating Tags</title>
</head>
<body>
    <b>This is bold text </b>
    <br>
    <strong>This is strong text </strong>
    <br>
    <i>This is italic text </i>
    <br>
    <em>This is emphasized text </em>
    <br>
    <u>This is underlined text </u>
    <br>
    <ins>This is inserted text </ins>
    <br>
    <s>This is strikethrough text </s>
    <br>
    <mark>This is marked text </mark>
    <br>
    <small>This is small text </small>
    <br>
    <del>This is deleted text </del>
    <br>
    <sub>This is subscript text H <sub>2</sub>O</sub>
    <br>
    <sup>This is superscript text 4 <sup>2</sup></sup>
    <br>
    <big>This is big text </big>




</body>
</html>
