<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Tag Example</title>
</head>
<body>
<!-- Controls is important for video playback -->
 <!-- Poster is the image that is displayed before the video starts -->
  <!-- loop muted autoplay attributes are used to control video behavior -->
    <video width="500" height="400" poster="images/Naik.jpeg" loop muted autoplay="autoplay" controls>  
        <source src="videos/Adhi.mp4" type="video/mp4">
    </video>
    <br>
    <br>
    <br>
    <video width="500" height="400" poster="images/Naik.jpeg" controls>  
        <source src="videos/Adhi.mp4" type="video/mp4">
    </video>

</body>
</html>
