<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Tags</title>
</head>
<body>
    <picture>
        <source media="(min-width: 1200px)" srcset="images/image1.png">
        <source media="(min-width: 1000px)" srcset="images/image2.png">
        <source media="(min-width: 800px)" srcset="images/image3.png">
        <source media="(min-width: 400px)" srcset="images/Esha_Photo.jpg">
        <img src="images/image.png" alt="Girl Photo">
    </picture>
</body>
</html>
