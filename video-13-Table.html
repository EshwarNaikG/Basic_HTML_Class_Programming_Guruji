<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Element</title>
</head>
<body>
    <h1>Table Element</h1>
    <table border="1" cellspacing="0" cellpadding="10">
        <tr style="background-color: lightblue;">
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>Esha</td>
            <td>22</td>
            <td>Delhi</td>
        </tr>
        <tr>
            <td>Riya</td>
            <td>21</td>
            <td>Mumbai</td>
        </tr>
        <tr>
            <td>Amit</td>
            <td>25</td>
            <td>Kolkata</td>
        </tr>
</body>
</html>
