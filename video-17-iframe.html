<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFrame in HTML</title>
</head>
<body>
    <h1>What is an IFrame?</h1>
    <p>An iframe (short for inline frame) in HTML is used to embed another webpage 
        or content inside your current webpage.</p>

    <iframe  height="400px"  width="700px" name="myFrame"></iframe>
    <br>
    <a href="https://www.example.com" target="myFrame" >Go to IFrame</a>
</body>
</html>
