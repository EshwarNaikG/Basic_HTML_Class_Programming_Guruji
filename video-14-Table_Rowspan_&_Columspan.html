<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Rowspan & Columnspan</title>
</head>
<body>
    <h1 style="display:inline-block; background-color: yellow; color: red; text-align: center; align-items: center; ">Table Columnspan</h1>
    <table border="1" cellspacing="0" cellpadding="10" style="width: 100%; text-align: center;">
        <tr>
            <th>Name</th>
            <th colspan="2">Telephone</th>
        </tr>
        <tr>
            <td>Eshwar Naik G</td>
            <td>+91 948 068 1234</td>
            <td>+91 748 068 1234</td>
        </tr>
    </table>
    <br>
    <hr>
    <h1 style="display:inline-block; background-color: yellow; color: red; text-align: center; align-items: center; ">Table Rowspan</h1>
    <table border="1" cellspacing="0" cellpadding="10" style="width:100%; text-align: center;">
        <tr>
            <th>Name</th>
            <th>Telephone</th>
        </tr>
        <tr>
            <td rowspan="2">Eshwar Naik G</td>
            <td>+91 948 068 1234</td>
        </tr>
        <tr>
            <td>+91 748 068 1234</td>
        </tr>
    </table>
</body>
</html>
